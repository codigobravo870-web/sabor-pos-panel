<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sabor POS Admin</title><style>
*{box-sizing:border-box}body{margin:0;background:#f5efe8;color:#14211a;font-family:Arial,sans-serif}header{background:#173729;color:#fff;padding:20px;font-weight:800;letter-spacing:1px}main{max-width:1100px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.card{background:#fff;border:1px solid #ded5ca;border-radius:16px;padding:20px;margin:16px 0}input,textarea,button{width:100%;padding:13px;margin:6px 0;border:1px solid #d8cec2;border-radius:10px;font:inherit}button,.btn{background:#28563f;color:#fff;border:0;font-weight:700;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 1.25fr;gap:18px}table{width:100%;border-collapse:collapse}th,td{text-align:left;border-bottom:1px solid #e4ddd5;padding:10px 6px}.msg{background:#f6bb3f;padding:12px;border-radius:10px;font-weight:700}.muted{color:#66736c;font-size:13px}.codigo{word-break:break-all;background:#f1eee9;padding:12px;border-radius:8px}#panel{display:none}#salir{width:auto;padding:10px 16px}@media(max-width:760px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}table{font-size:13px}}
</style></head><body><header>SABOR POS / PANEL MAESTRO EN LA NUBE</header><main>
<section id="login" class="card" style="max-width:480px;margin:40px auto"><h1>Acceso privado</h1><input id="usuario" value="admin" placeholder="Usuario"><input id="clave" type="password" placeholder="Contraseña"><button onclick="entrar()">Ingresar</button><p id="error" class="msg" style="display:none"></p></section>
<div id="panel"><div class="top"><div><div class="muted">MENSUALIDADES</div><h1>Clientes</h1></div><button id="salir" onclick="salir()">Cerrar sesion</button></div><div id="mensaje" style="display:none" class="msg"></div><div class="grid"><section class="card"><h2>Registrar negocio</h2><form id="crear"><input name="codigo" placeholder="Codigo corto, ej: burgercentro" required><input name="nombre" placeholder="Nombre del negocio" required><input name="contacto" placeholder="Persona de contacto"><input name="telefono" placeholder="Telefono / WhatsApp"><input name="instalacion_id" placeholder="Identificador de instalacion" required><input name="vence_el" type="date" required><textarea name="nota" placeholder="Nota opcional"></textarea><button>Registrar cliente</button></form></section><section class="card"><h2>Suscripciones</h2><div style="overflow:auto"><table><thead><tr><th>Negocio</th><th>Vence</th><th>Estado</th><th></th></tr></thead><tbody id="filas"></tbody></table></div></section></div><section id="actividad" class="card" style="display:none"></section></div>
</main><script>
const API='https://pyvihavcymxaxhsxlfiv.supabase.co/functions/v1/panel-licencias';let auth=sessionStorage.getItem('sabor_auth')||'';
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
async function pedir(accion,op={}){const r=await fetch(API+'?api='+accion,{...op,headers:{'Authorization':'Basic '+auth,'Content-Type':'application/json',...(op.headers||{})}});if(r.status===401)throw new Error('Clave incorrecta');const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'No fue posible completar la operacion');return d}
function aviso(t){const m=document.getElementById('mensaje');m.textContent=t;m.style.display='block';setTimeout(()=>m.style.display='none',6000)}
async function entrar(){auth=btoa(document.getElementById('usuario').value+':'+document.getElementById('clave').value);try{await cargar();sessionStorage.setItem('sabor_auth',auth);document.getElementById('login').style.display='none';document.getElementById('panel').style.display='block'}catch(e){document.getElementById('error').textContent=e.message;document.getElementById('error').style.display='block'}}
function salir(){sessionStorage.removeItem('sabor_auth');auth='';location.reload()}
async function cargar(){const d=await pedir('listar');const f=document.getElementById('filas');f.innerHTML=d.negocios.length?d.negocios.map(n=>'<tr><td><strong>'+esc(n.nombre)+'</strong><br><span class="muted">'+esc(n.codigo)+'</span></td><td>'+esc(n.vence_el)+'</td><td>'+esc(n.estado_calculado)+'</td><td><button onclick="actividad('+Number(n.id)+',\''+esc(n.nombre)+'\')">Ver actividad</button><button onclick="renovar('+Number(n.id)+',\''+esc(n.instalacion_id)+'\')">Renovar 30 dias</button><button onclick="conexion('+Number(n.id)+',\''+esc(n.instalacion_id)+'\')">Generar conexion</button></td></tr>').join(''):'<tr><td colspan="4">Aun no hay clientes.</td></tr>'}
async function renovar(id,instalacion){try{const d=await pedir('renovar',{method:'POST',body:JSON.stringify({negocio_id:id,instalacion_id:instalacion})});await cargar();prompt('Codigo de activacion. Copialo y envialo al cliente:',d.codigo);aviso('Renovacion creada hasta '+d.vence_nuevo)}catch(e){aviso(e.message)}}
async function conexion(id,instalacion){try{const d=await pedir('conexion',{method:'POST',body:JSON.stringify({negocio_id:id,instalacion_id:instalacion})});prompt('Clave de conexion. Se muestra una sola vez; pegala en Configuracion de Sabor POS:',d.token);aviso('Clave de conexion generada. La anterior, si existia, dejo de funcionar.')}catch(e){aviso(e.message)}}
const dinero=v=>'$'+Number(v||0).toLocaleString('es-CO');
async function actividad(id,nombre){try{const d=await pedir('actividad&negocio_id='+id);const a=document.getElementById('actividad');const filas=d.pedidos.length?d.pedidos.map(p=>'<tr><td>'+esc(p.numero)+'</td><td>'+esc(p.cliente||p.tipo)+'</td><td>'+esc(p.estado)+'</td><td>'+esc(p.pago_estado)+'</td><td>'+dinero(p.total)+'</td></tr>').join(''):'<tr><td colspan="5">Aun no hay pedidos hoy.</td></tr>';a.innerHTML='<div class="top"><div><div class="muted">ACTIVIDAD DE HOY</div><h2>'+esc(nombre)+'</h2></div><button style="width:auto" onclick="this.parentElement.parentElement.style.display=\'none\'">Cerrar</button></div><p><strong>Pedidos:</strong> '+d.resumen.pedidos+' &nbsp; <strong>Ventas:</strong> '+dinero(d.resumen.venta)+' &nbsp; <strong>Por cobrar:</strong> '+dinero(d.resumen.pendientes)+'</p><div style="overflow:auto"><table><thead><tr><th>Pedido</th><th>Cliente</th><th>Estado</th><th>Pago</th><th>Total</th></tr></thead><tbody>'+filas+'</tbody></table></div>';a.style.display='block';a.scrollIntoView({behavior:'smooth'})}catch(e){aviso(e.message)}}
document.getElementById('crear').addEventListener('submit',async e=>{e.preventDefault();const o=Object.fromEntries(new FormData(e.target));try{await pedir('crear',{method:'POST',body:JSON.stringify(o)});e.target.reset();prepararFecha();await cargar();aviso('Cliente registrado en la nube.')}catch(x){aviso(x.message)}});
function prepararFecha(){const d=new Date();d.setDate(d.getDate()+15);document.querySelector('[name=vence_el]').value=d.toISOString().slice(0,10)}prepararFecha();if(auth)entrar();
</script></body></html>
